[formatter.prettier]
command = "prettier"
includes = [
  "*.css",
  "*.html",
  "*.js",
  "*.json",
  "*.jsx",
  "*.md",
  "*.mdx",
  "*.scss",
  "*.ts",
  "*.yaml",
  "*.toml",
]
options = ["--plugin", "prettier-plugin-toml", "--write"]

[formatter.stylua]
command = "stylua"
includes = ["*.lua"]
options = ["-"]
